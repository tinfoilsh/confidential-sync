shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 2
memory: 2048

containers:
  - name: "sync-enclave"
    image: "ghcr.io/tinfoilsh/confidential-sync@sha256:f0e354af675cd7f010bfe49a4a92b98858df39197dcd2b2f62d66a43995aa6af" # v0.0.5
    env:
      - CONTROLPLANE_URL: "https://api.tinfoil.sh"
      - BUCKETS_URL: "https://buckets.tinfoil.sh"
      - CLERK_ISSUER: "https://clerk.tinfoil.sh"
    secrets:
      - BUCKETS_API_KEY
      - SYNC_ENCLAVE_SECRET

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /health
    - /v1/health
    - /v1/sync/push
    - /v1/sync/pull
    - /v1/sync/list-status
    - /v1/sync/delete
    - /v1/key/register
    - /v1/key/add-bundle
    - /v1/key/remove-bundle
    - /v1/key/current
    - /v1/blobs/migrate
    - /v1/blobs/migrate-all
    - /v1/attachment/put
    - /v1/attachment/get
    - /v1/attachment/delete
    - /v1/attachment/get-public
    - /v1/share/seal
    - /v1/share/open
