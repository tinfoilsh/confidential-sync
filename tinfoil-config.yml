shim-version: v0.3.18@sha256:7d9f98be78c91ede89f43c948a12d084fae34312effe9395ca7ed572991cb561
cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "sync-enclave"
    image: "ghcr.io/tinfoilsh/confidential-sync@sha256:07d71d2ca4eda3f2f4c313468d523fc74a673638c132a013618d92a5b38c9d21" # v0.0.15
    env:
      - CONTROLPLANE_URL: "https://api.tinfoil.sh"
      - BUCKETS_URL: "http://localhost:9000"
      - CLERK_ISSUER: "https://clerk.tinfoil.sh"
    secrets:
      - SYNC_ENCLAVE_SECRET

  - name: "buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets-sidecar@sha256:a0f5fd6a3dbdb0a95799ae687e127bb544b7998221458ae1face3fc8c3f43f30" # v0.0.5
    env:
      - PORT: "9000"
      - BUCKET: "tinfoil-bucket-273354634536-us-east-2-an"
      - AWS_REGION: "us-east-2"
      - MULTITENANT: "true"
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY

shim:
  listen-port: 443
  upstream-port: 8089
  paths:
    - /health
    - /v1/health
    - /v1/sync/push
    - /v1/sync/pull
    - /v1/sync/list-status
    - /v1/sync/delete
    - /v1/key/register
    - /v1/key/add-bundle
    - /v1/key/remove-bundle
    - /v1/key/current
    - /v1/blobs/migrate
    - /v1/blobs/migrate-all
    - /v1/blobs/migrate-status
    - /v1/attachment/put
    - /v1/attachment/get
    - /v1/attachment/delete
    - /v1/attachment/get-public
    - /v1/share/seal
    - /v1/share/open
